server {
    listen 80;
    # Server name
    server_name mowiliff.cyntelli.com;

    # Public web root
    root /var/www/supreme-salmon-liff/webroot/dist;

    client_max_body_size 16M;
    # Add index.php to the list if you are using PHP
    index index.html;

    # Log Setting
    access_log /var/www/supreme-salmon-liff/logs/access.log combined_realip;
    error_log /var/www/supreme-salmon-liff/logs/error.log;

    location / {
        # First attempt to serve request as file, then
        # as directory, then fall back to displaying a 404.
        try_files $uri $uri/ /index.html$is_args$args;
    }
}
