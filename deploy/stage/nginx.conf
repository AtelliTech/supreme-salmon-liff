server {
    listen 80;
    # Server name
    server_name maropilot.cyntelli.com
                ad-monitor.staging.cyntellitech.com;

    client_max_body_size 16M;
    # Add index.php to the list if you are using PHP
    index index.html;

    # Log Setting
    access_log /var/www/supreme-salmon-liff/logs/access.log combined_realip;
    error_log /var/www/supreme-salmon-liff/logs/error.log;

    location / {
        # Reverse proxy for Next server
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Add for allow big header
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # we need to remove this 404 handling
        # because of Next's error handling and _next folder
        # try_files $uri $uri/ =404;
    }
}
