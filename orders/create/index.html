<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>訂單明細 - MOWI Taiwan</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/micromodal/dist/micromodal.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              salmon: {
                50: "#f5f4f3",
                100: "#e6e4e2",
                500: "#2C2A29",
                600: "#1f1e1d",
              },
            },
          },
        },
      };
    </script>
    <style>
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none; /* IE and Edge */
        scrollbar-width: none; /* Firefox */
      }
      /* Support for safe area in iOS browsers/LIFF */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .modal {
        display: none;
      }
      .modal.is-open {
        display: block;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-800 antialiased pb-48">
    <!-- Header -->
    <header
      class="sticky top-0 z-40 bg-white shadow-sm px-4 py-3 flex items-center justify-between"
    >
      <a
        href="../../products/index.html"
        class="text-gray-600 w-8 h-8 flex items-center justify-center hover:bg-gray-100 rounded-full transition-colors relative -left-2"
      >
        <i class="fas fa-chevron-left"></i>
      </a>
      <h1 class="text-lg font-bold text-gray-800">訂單明細</h1>
      <div class="w-8"></div>
      <!-- Spacer for centering title -->
    </header>

    <main class="p-3 flex flex-col gap-3">
      <!-- Product Summary -->
      <div
        class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden"
      >
        <div
          class="px-4 py-3 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center"
        >
          <div class="flex items-center">
            <i class="fas fa-shopping-cart text-gray-400 mr-2"></i>
            <h3 id="order-item-title" class="font-bold text-sm text-gray-700">
              商品清單 (0)
            </h3>
          </div>
          <button
            type="button"
            id="open-add-product-modal"
            class="text-[10px] text-salmon-600 font-medium bg-salmon-50 px-2 py-1 rounded"
          >
            新增
          </button>
        </div>

        <div id="order-item-list" class="p-4 space-y-4"></div>
      </div>

      <!-- Shipping Form -->
      <div
        class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden"
      >
        <div
          class="px-4 py-3 border-b border-gray-100 bg-gray-50/50 flex items-center"
        >
          <i class="fas fa-truck text-gray-400 mr-2"></i>
          <h3 class="font-bold text-sm text-gray-700">收件與配送資訊</h3>
        </div>

        <div class="p-4 space-y-4">
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1"
              >店別 <span class="text-red-500">*</span></label
            >
            <select
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-salmon-500 text-gray-700 bg-gray-50 focus:bg-white appearance-none"
            >
              <option value="">選擇店別</option>
              <option value="TPE">饗食天堂 - 台北市</option>
              <option value="NWT">饗食天堂 - 新北市</option>
            </select>
          </div>

          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1"
              >收件地址 <span class="text-red-500">*</span></label
            >
            <div class="grid grid-cols-2 gap-2 mb-2">
              <!-- <select
                class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-salmon-500 text-gray-700 bg-gray-50 focus:bg-white appearance-none"
              >
                <option value="">選擇縣市</option>
                <option value="TPE">台北市</option>
                <option value="NWT">新北市</option>
              </select>
              <select
                class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-salmon-500 text-gray-700 bg-gray-50 focus:bg-white appearance-none"
              >
                <option value="">選擇區域</option>
                <option value="110">信義區</option>
                <option value="106">大安區</option>
              </select> -->
            </div>
            <input
              type="text"
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-salmon-500 focus:ring-1 focus:ring-salmon-500 transition-shadow bg-gray-50 focus:bg-white"
              placeholder="詳細地址、樓層"
            />
          </div>

          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1"
              >訂單備註 (選填)</label
            >
            <textarea
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-salmon-500 focus:ring-1 focus:ring-salmon-500 transition-shadow bg-gray-50 focus:bg-white h-20 resize-none"
              placeholder="有沒有什麼要告訴我們的？例如：請交由管理室代收..."
            ></textarea>
          </div>
        </div>
      </div>
    </main>

    <!-- Bottom Submission Bar -->
    <div
      class="fixed bottom-0 left-0 w-full bg-white shadow-[0_-8px_15px_-3px_rgba(0,0,0,0.05)] border-t border-gray-100 pb-safe z-40"
    >
      <!-- Expandable Price Detail -->
      <!-- <div
        class="px-4 pt-3 pb-2 flex justify-between items-start border-b border-gray-50 border-dashed"
      >
        <div class="text-xs text-gray-400">
          商品小計<br /><span class="font-medium text-salmon-600 inline-block"
            >NT$ 1,280</span
          >
        </div>
        <div class="text-right">
          <span class="text-xs text-gray-400 block mb-0.5">應付總額</span>
          <span class="text-2xl font-bold text-salmon-600 leading-none"
            >NT$ 1,330</span
          >
        </div>
      </div> -->

      <!-- Submit Button -->
      <div class="p-3">
        <button
          type="button"
          data-micromodal-trigger="confirm-order-modal"
          aria-label="開啟送出訂單確認視窗"
          class="w-full bg-salmon-500 text-white font-bold text-sm lg:text-base py-3.5 rounded-xl shadow-md hover:bg-salmon-600 active:scale-[0.98] transition-all flex justify-center items-center gap-2"
        >
          <i class="fas fa-lock text-sm opacity-80"></i> 送出
        </button>
        <div class="text-[10px] text-center text-gray-400 mt-2">
          點擊按鈕即表示您同意我們的<a
            href="#"
            class="underline text-gray-500 mx-1"
            >服務條款</a
          >與<a href="#" class="underline text-gray-500 mx-1">隱私政策</a>
        </div>
      </div>
    </div>

    <div
      id="add-product-modal"
      aria-hidden="true"
      class="fixed inset-0 z-50 hidden"
    >
      <button
        type="button"
        id="add-product-backdrop"
        aria-label="關閉新增商品視窗"
        class="absolute inset-0 bg-black/40"
      ></button>

      <div
        role="dialog"
        aria-modal="true"
        aria-labelledby="add-product-modal-title"
        class="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl max-h-[82vh] overflow-hidden shadow-2xl pb-safe"
      >
        <div
          class="px-4 py-3 border-b border-gray-100 flex items-center justify-between"
        >
          <h2 id="add-product-modal-title" class="font-bold text-base text-gray-800">
            新增商品
          </h2>
          <button
            type="button"
            id="add-product-modal-close"
            class="w-8 h-8 rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 transition-colors"
            aria-label="關閉新增商品視窗"
          >
            <i class="fas fa-xmark"></i>
          </button>
        </div>

        <div id="add-product-list" class="p-4 space-y-2 max-h-[60vh] overflow-y-auto"></div>
      </div>
    </div>

    <div
      class="modal fixed inset-0 z-50"
      id="confirm-order-modal"
      aria-hidden="true"
    >
      <div
        class="fixed inset-0 bg-gray-900/45 px-4 py-6 flex items-center justify-center"
        tabindex="-1"
        data-micromodal-close
      >
        <div
          class="w-full max-w-sm rounded-2xl bg-white shadow-2xl overflow-hidden"
          role="dialog"
          aria-modal="true"
          aria-labelledby="confirm-order-modal-title"
          aria-describedby="confirm-order-modal-content"
        >
          <div class="px-5 pt-5 pb-4 border-b border-gray-100 flex items-start gap-3">
            <div class="w-10 h-10 rounded-full bg-salmon-50 text-salmon-500 flex items-center justify-center shrink-0">
              <i class="fas fa-circle-exclamation text-base"></i>
            </div>
            <div class="flex-1">
              <h2
                id="confirm-order-modal-title"
                class="text-base font-bold text-gray-800"
              >
                送出訂單
              </h2>
              <p
                id="confirm-order-modal-content"
                class="text-sm text-gray-500 mt-1 leading-6"
              >
                訂單送出後將進入處理流程。請再次確認商品、配送資訊與備註內容是否正確。
              </p>
            </div>
            <button
              type="button"
              class="w-8 h-8 rounded-full text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition-colors"
              aria-label="關閉確認視窗"
              data-micromodal-close
            >
              <i class="fas fa-xmark"></i>
            </button>
          </div>

          <div class="px-5 py-4 bg-gray-50/80 text-xs text-gray-500 leading-5">
            送出後若需修改內容，請聯繫客服協助處理。
          </div>

          <div class="p-4 grid grid-cols-2 gap-3">
            <button
              type="button"
              class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm font-semibold text-gray-600 transition-colors hover:bg-gray-50"
              data-micromodal-close
            >
              再檢查一下
            </button>
            <button
              type="button"
              id="confirm-order-submit"
              class="w-full rounded-xl bg-salmon-500 px-4 py-3 text-sm font-semibold text-white shadow-md transition-colors hover:bg-salmon-600"
            >
              送出訂單
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      (() => {
        MicroModal.init({
          disableScroll: true,
        });

        const orderItemTitle = document.getElementById("order-item-title");
        const orderItemList = document.getElementById("order-item-list");
        const openAddProductModalBtn = document.getElementById(
          "open-add-product-modal",
        );

        const addProductModal = document.getElementById("add-product-modal");
        const addProductBackdrop = document.getElementById("add-product-backdrop");
        const addProductModalClose = document.getElementById(
          "add-product-modal-close",
        );
        const addProductList = document.getElementById("add-product-list");

        const state = {
          orderItems: [
            {
              id: "salmon-fillet-300g",
              name: "頂級挪威鮮切鮭魚菲力",
              spec: "300g (厚切)",
              price: 380,
              qty: 2,
              image: "/placeholder.jpg",
              alt: "鮭魚",
            },
            {
              id: "salmon-steak-500g",
              name: "智利厚切鮭魚排 家庭號",
              spec: "500g",
              price: 520,
              qty: 1,
              image: "/placeholder.jpg",
              alt: "鮭魚排",
            },
          ],
        };

        const availableProducts = [
          {
            id: "salmon-fillet-300g",
            name: "頂級挪威鮮切鮭魚菲力",
            spec: "300g (厚切)",
            price: 380,
            image: "/placeholder.jpg",
            alt: "鮭魚",
          },
          {
            id: "salmon-steak-500g",
            name: "智利厚切鮭魚排 家庭號",
            spec: "500g",
            price: 520,
            image: "/placeholder.jpg",
            alt: "鮭魚排",
          },
          {
            id: "salmon-belly-250g",
            name: "炙燒級鮭魚腹排",
            spec: "250g",
            price: 320,
            image: "/placeholder.jpg",
            alt: "鮭魚腹排",
          },
          {
            id: "salmon-cube-600g",
            name: "鮭魚丁料理包",
            spec: "600g",
            price: 460,
            image: "/placeholder.jpg",
            alt: "鮭魚丁",
          },
        ];

        const normalizeQty = (value) => {
          const parsedQty = Number(value);
          if (!Number.isFinite(parsedQty)) {
            return 0;
          }

          return Math.max(0, Math.floor(parsedQty));
        };

        const formatPrice = (price) => `NT$ ${price}`;

        const setBodyScrollLock = (isLocked) => {
          if (isLocked) {
            document.body.classList.add("overflow-hidden");
            return;
          }

          document.body.classList.remove("overflow-hidden");
        };

        const renderAddProductList = () => {
          addProductList.innerHTML = availableProducts
            .map((product) => {
              const existingItem = state.orderItems.find(
                (item) => item.id === product.id,
              );

              return `
              <button
                type="button"
                data-add-product-id="${product.id}"
                class="w-full border border-gray-100 rounded-xl px-3 py-3 text-left flex items-center gap-3 hover:border-salmon-300 transition-colors"
                aria-label="加入 ${product.name}"
              >
                <div class="w-14 h-14 rounded-lg overflow-hidden border border-gray-100 shrink-0">
                  <img src="${product.image}" alt="${product.alt}" class="w-full h-full object-contain" />
                </div>
                <div class="flex-1 min-w-0">
                  <p class="text-sm font-medium text-gray-800 line-clamp-1">${product.name}</p>
                  <p class="text-[11px] text-gray-400 mt-0.5">${product.spec}</p>
                  <p class="text-sm font-bold text-salmon-600 mt-1">${formatPrice(product.price)}</p>
                </div>
                <div class="text-[10px] rounded-full px-2 py-1 ${
                  existingItem
                    ? "bg-gray-100 text-gray-500"
                    : "bg-salmon-50 text-salmon-600"
                }">
                  ${existingItem ? "已在清單" : "新增"}
                </div>
              </button>
            `;
            })
            .join("");
        };

        const renderOrderItems = () => {
          const itemCount = state.orderItems.length;
          orderItemTitle.textContent = `商品清單 (${itemCount})`;

          if (!itemCount) {
            orderItemList.innerHTML = `
              <div class="text-center py-8 rounded-xl border border-dashed border-gray-200 bg-gray-50/80">
                <p class="text-sm text-gray-500">目前尚未加入商品</p>
                <p class="text-xs text-gray-400 mt-1">請點擊上方「新增」開始選購</p>
              </div>
            `;
            renderAddProductList();
            return;
          }

          orderItemList.innerHTML = state.orderItems
            .map(
              (item) => `
                <div class="flex gap-3" data-order-item-id="${item.id}">
                  <div class="w-16 h-16 rounded-lg overflow-hidden shrink-0 border border-gray-100">
                    <img src="${item.image}" alt="${item.alt}" class="w-full h-full object-contain" />
                  </div>

                  <div class="flex-1 min-w-0 flex flex-col">
                    <div class="flex justify-between items-start gap-2">
                      <h4 class="text-sm font-medium text-gray-800 line-clamp-1">${item.name}</h4>
                      <button
                        type="button"
                        data-remove-item-id="${item.id}"
                        class="text-[11px] text-red-500 bg-red-50 px-2 py-1 rounded-md shrink-0"
                        aria-label="刪除 ${item.name}"
                      >
                        刪除
                      </button>
                    </div>

                    <p class="text-[11px] text-gray-400 mt-0.5">${item.spec}</p>

                    <div class="mt-2 flex items-center justify-between gap-2">
                      <span class="text-salmon-600 font-bold text-sm">${formatPrice(item.price)}</span>

                      <div class="inline-flex items-center border border-gray-200 rounded-xl overflow-hidden">
                        <button
                          type="button"
                          data-qty-minus="${item.id}"
                          class="w-9 h-9 bg-gray-50 text-gray-600 hover:bg-gray-100 active:scale-95 transition-transform"
                          aria-label="減少數量"
                        >
                          <i class="fas fa-minus text-xs"></i>
                        </button>

                        <input
                          type="number"
                          min="0"
                          step="1"
                          inputmode="numeric"
                          data-qty-input="${item.id}"
                          value="${item.qty}"
                          class="w-14 text-center font-semibold text-gray-800 bg-white focus:outline-none"
                          aria-label="輸入數量"
                        />

                        <button
                          type="button"
                          data-qty-plus="${item.id}"
                          class="w-9 h-9 bg-gray-50 text-gray-600 hover:bg-gray-100 active:scale-95 transition-transform"
                          aria-label="增加數量"
                        >
                          <i class="fas fa-plus text-xs"></i>
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              `,
            )
            .join("");

          renderAddProductList();
        };

        const updateQtyById = (id, nextQty) => {
          const safeQty = normalizeQty(nextQty);
          state.orderItems = state.orderItems.map((item) =>
            item.id === id ? { ...item, qty: safeQty } : item,
          );
          renderOrderItems();
        };

        const removeItemById = (id) => {
          const target = state.orderItems.find((item) => item.id === id);

          if (!target) {
            return;
          }

          const shouldRemove = window.confirm(`確定要刪除「${target.name}」嗎？`);
          if (!shouldRemove) {
            return;
          }

          state.orderItems = state.orderItems.filter((item) => item.id !== id);
          renderOrderItems();
        };

        const addProductById = (id) => {
          const product = availableProducts.find((item) => item.id === id);

          if (!product) {
            return;
          }

          const existingItem = state.orderItems.find((item) => item.id === id);
          if (existingItem) {
            updateQtyById(id, existingItem.qty + 1);
            closeAddProductModal();
            return;
          }

          state.orderItems = [...state.orderItems, { ...product, qty: 1 }];
          renderOrderItems();
          closeAddProductModal();
        };

        const openAddProductModal = () => {
          addProductModal.classList.remove("hidden");
          addProductModal.setAttribute("aria-hidden", "false");
          setBodyScrollLock(true);
        };

        const closeAddProductModal = () => {
          addProductModal.classList.add("hidden");
          addProductModal.setAttribute("aria-hidden", "true");
          setBodyScrollLock(false);
        };

        openAddProductModalBtn.addEventListener("click", openAddProductModal);
        addProductModalClose.addEventListener("click", closeAddProductModal);
        addProductBackdrop.addEventListener("click", closeAddProductModal);

        addProductList.addEventListener("click", (event) => {
          const button = event.target.closest("[data-add-product-id]");
          if (!button) {
            return;
          }

          addProductById(button.dataset.addProductId || "");
        });

        orderItemList.addEventListener("click", (event) => {
          const minusButton = event.target.closest("[data-qty-minus]");
          if (minusButton) {
            const id = minusButton.dataset.qtyMinus || "";
            const target = state.orderItems.find((item) => item.id === id);
            updateQtyById(id, (target?.qty || 0) - 1);
            return;
          }

          const plusButton = event.target.closest("[data-qty-plus]");
          if (plusButton) {
            const id = plusButton.dataset.qtyPlus || "";
            const target = state.orderItems.find((item) => item.id === id);
            updateQtyById(id, (target?.qty || 0) + 1);
            return;
          }

          const removeButton = event.target.closest("[data-remove-item-id]");
          if (removeButton) {
            removeItemById(removeButton.dataset.removeItemId || "");
          }
        });

        orderItemList.addEventListener("input", (event) => {
          const input = event.target.closest("[data-qty-input]");
          if (!input) {
            return;
          }

          updateQtyById(input.dataset.qtyInput || "", input.value);
        });

        orderItemList.addEventListener("blur", (event) => {
          const input = event.target.closest("[data-qty-input]");
          if (!input) {
            return;
          }

          updateQtyById(input.dataset.qtyInput || "", input.value);
        }, true);

        document.addEventListener("keydown", (event) => {
          if (
            event.key === "Escape" &&
            addProductModal.getAttribute("aria-hidden") === "false"
          ) {
            closeAddProductModal();
          }
        });

        document
          .getElementById("confirm-order-submit")
          .addEventListener("click", () => {
            MicroModal.close("confirm-order-modal");
          });

        renderOrderItems();
      })();
    </script>
  </body>
</html>
