<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的訂單 - Supreme Salmon</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        salmon: {
                            50: '#fff3f1',
                            100: '#ffe4df',
                            500: '#ff7b65',
                            600: '#f55a42',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        /* Support for safe area in iOS browsers/LIFF */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased no-scrollbar pb-20">

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-white shadow-sm px-4 py-3 flex items-center justify-center relative">
        <h1 class="text-lg font-bold text-gray-800">我的訂單</h1>
    </header>

    <!-- Categories / Tabs (Horizontal Scroll) -->
    <div class="bg-white px-3 py-3 overflow-x-auto no-scrollbar whitespace-nowrap shadow-sm mb-2 border-t border-gray-100">
        <a href="#" class="inline-block px-4 py-1.5 bg-salmon-500 text-white text-sm font-medium rounded-full mr-2">全部</a>
        <a href="#" class="inline-block px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full mr-2 transition-colors hover:bg-gray-200 relative">
            處理中
            <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center">1</span>
        </a>
        <a href="#" class="inline-block px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full mr-2 transition-colors hover:bg-gray-200 relative">
            待付款
            <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center">1</span>
        </a>
        <a href="#" class="inline-block px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full mr-2 transition-colors hover:bg-gray-200">已完成</a>
        <a href="#" class="inline-block px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full mr-2 transition-colors hover:bg-gray-200">已退款/取消</a>
    </div>

    <!-- Order List -->
    <main class="p-3 flex flex-col gap-3">
        
        <!-- Order Item 1 (Processing) -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <!-- Order Header -->
            <div class="px-4 py-3 flex justify-between items-center border-b border-gray-100 bg-gray-50/50">
                <div class="flex items-center gap-2">
                    <i class="fas fa-box text-salmon-500"></i>
                    <span class="text-sm font-bold text-gray-700">#ORD-20260309-001</span>
                </div>
                <span class="text-xs font-bold text-salmon-600 bg-salmon-50 px-2 py-1 rounded-md">處理中</span>
            </div>
            <!-- Order Content -->
            <div class="p-4 flex items-center gap-3">
                <div class="w-16 h-16 rounded-lg overflow-hidden shrink-0 border border-gray-100">
                    <img src="https://images.unsplash.com/photo-1599084993091-1cb5c0721cc6?auto=format&fit=crop&w=150&q=80" alt="頂級挪威鮮切鮭魚菲力" class="w-full h-full object-cover">
                </div>
                <div class="flex-1">
                    <h3 class="text-sm font-medium text-gray-800 line-clamp-1 mb-1">頂級挪威鮮切鮭魚菲力 等</h3>
                    <p class="text-xs text-gray-500 mb-1">共 3 件商品</p>
                    <p class="text-sm font-bold text-gray-800">總計: NT$ 1,280</p>
                </div>
            </div>
            <!-- Order Footer / Actions -->
            <div class="px-4 py-3 border-t border-gray-100 flex justify-between items-center bg-white">
                <p class="text-xs text-gray-400">2026/03/09 10:30</p>
                <div class="flex gap-2">
                    <a href="/orders/[id]/index.html" class="px-3 py-1.5 text-xs font-medium text-gray-600 border border-gray-200 rounded-full hover:bg-gray-50 transition-colors">查看詳情</a>
                </div>
            </div>
        </div>

        <!-- Order Item 2 (Pending Payment) -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <!-- Order Header -->
            <div class="px-4 py-3 flex justify-between items-center border-b border-gray-100 bg-gray-50/50">
                <div class="flex items-center gap-2">
                    <i class="fas fa-wallet text-orange-400"></i>
                    <span class="text-sm font-bold text-gray-700">#ORD-20260308-042</span>
                </div>
                <span class="text-xs font-medium text-orange-600 bg-orange-50 px-2 py-1 rounded-md">待付款</span>
            </div>
            <!-- Order Content (Multiple Items overlapping images style) -->
            <div class="p-4 flex items-center gap-3">
                <div class="flex -space-x-3 shrink-0">
                    <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-white shadow-sm z-20">
                        <img src="https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?auto=format&fit=crop&w=150&q=80" alt="鮭魚排" class="w-full h-full object-cover">
                    </div>
                    <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-white shadow-sm z-10 bg-gray-100">
                        <img src="https://images.unsplash.com/photo-1485921325833-c519f76c4927?auto=format&fit=crop&w=150&q=80" alt="燻鮭魚" class="w-full h-full object-cover pt-1">
                    </div>
                </div>
                <div class="flex-1 ml-2">
                    <h3 class="text-sm font-medium text-gray-800 line-clamp-1 mb-1">智利厚切鮭魚排 等</h3>
                    <p class="text-xs text-gray-500 mb-1">共 2 件商品</p>
                    <p class="text-sm font-bold text-gray-800">總計: NT$ 770</p>
                </div>
            </div>
            <!-- Order Footer / Actions -->
            <div class="px-4 py-3 border-t border-gray-100 flex justify-between items-center bg-white">
                <p class="text-xs text-gray-400">2026/03/08 09:15</p>
                <div class="flex gap-2">
                    <a href="/orders/[id]/index.html" class="px-3 py-1.5 text-xs font-medium text-gray-600 border border-gray-200 rounded-full hover:bg-gray-50 transition-colors">查看詳情</a>
                </div>
            </div>
        </div>

        <!-- Order Item 3 (Completed) -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <!-- Order Header -->
            <div class="px-4 py-3 flex justify-between items-center border-b border-gray-100 bg-gray-50/50">
                <div class="flex items-center gap-2">
                    <i class="fas fa-check-circle text-gray-400"></i>
                    <span class="text-sm font-bold text-gray-700">#ORD-20260305-088</span>
                </div>
                <span class="text-xs font-medium text-gray-500 bg-gray-100 px-2 py-1 rounded-md">已完成</span>
            </div>
            <!-- Order Content -->
            <div class="p-4 flex items-center gap-3">
                <div class="w-16 h-16 rounded-lg overflow-hidden shrink-0 border border-gray-100 relative">
                    <img src="https://images.unsplash.com/photo-1599084993091-1cb5c0721cc6?auto=format&fit=crop&w=150&q=80" alt="鮭魚卵" class="w-full h-full object-cover grayscale-[20%]">
                </div>
                <div class="flex-1">
                    <h3 class="text-sm font-medium text-gray-800 line-clamp-1 mb-1">嚴選北海道生食級鮭魚卵</h3>
                    <p class="text-xs text-gray-500 mb-1">共 1 件商品</p>
                    <p class="text-sm font-bold text-gray-800">總計: NT$ 890</p>
                </div>
            </div>
            <!-- Order Footer / Actions -->
            <div class="px-4 py-3 border-t border-gray-100 flex justify-between items-center bg-white">
                <p class="text-xs text-gray-400">2026/03/05 14:20</p>
                <div class="flex gap-2">
                    <a href="/orders/[id]/index.html" class="px-3 py-1.5 text-xs font-medium text-gray-600 border border-gray-200 rounded-full hover:bg-gray-50 transition-colors">查看詳情</a>
                </div>
            </div>
        </div>

    </main>

    <!-- Bottom Navigation Bar (Mobile App Style) -->
    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 pb-safe z-40">
        <div class="flex justify-around items-center h-14">
            <a href="../products/index.html" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fas fa-store text-lg mb-0.5"></i>
                <span class="text-[10px] font-medium">商品</span>
            </a>
            <a href="#" class="flex flex-col items-center justify-center w-full h-full text-salmon-500">
                <i class="fas fa-file-invoice text-lg mb-0.5"></i>
                <span class="text-[10px] font-medium">訂單</span>
            </a>
            <a href="#" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fas fa-user text-lg mb-0.5"></i>
                <span class="text-[10px] font-medium">會員</span>
            </a>
        </div>
    </nav>

</body>
</html>
