<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>我的訂單 - MOWI Taiwan</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              salmon: {
                50: "#f5f4f3",
                100: "#e6e4e2",
                500: "#2C2A29",
                600: "#1f1e1d",
              },
            },
          },
        },
      };
    </script>
    <style>
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none; /* IE and Edge */
        scrollbar-width: none; /* Firefox */
      }
      /* Support for safe area in iOS browsers/LIFF */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-800 antialiased no-scrollbar pb-20">
    <!-- Header -->
    <header
      class="sticky top-0 z-40 bg-white shadow-sm px-4 py-3 flex items-center justify-center relative"
    >
      <h1 class="text-lg font-bold text-gray-800">我的訂單</h1>
    </header>

    <!-- Categories / Tabs (Horizontal Scroll) -->
    <div
      class="bg-white px-3 py-3 overflow-x-auto no-scrollbar whitespace-nowrap shadow-sm mb-2 border-t border-gray-100 order-tabs"
    >
      <a
        href="#"
        data-filter="all"
        class="inline-block px-4 py-1.5 bg-salmon-500 text-white text-sm font-medium rounded-full mr-2"
        >全部</a
      >
      <a
        href="#"
        data-filter="processing"
        class="inline-block px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full mr-2 transition-colors hover:bg-gray-200 relative"
      >
        處理中
        <span
          class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center"
          >1</span
        >
      </a>
      <a
        href="#"
        data-filter="established"
        class="inline-block px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full mr-2 transition-colors hover:bg-gray-200 relative"
      >
        已成立
        <span
          class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center"
          >1</span
        >
      </a>
      <a
        href="#"
        data-filter="pending"
        class="inline-block px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full mr-2 transition-colors hover:bg-gray-200 relative"
      >
        待收貨
        <span
          class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center"
          >1</span
        >
      </a>
      <a
        href="#"
        data-filter="completed"
        class="inline-block px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full mr-2 transition-colors hover:bg-gray-200"
        >已完成</a
      >
      <a
        href="#"
        data-filter="cancelled"
        class="inline-block px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full mr-2 transition-colors hover:bg-gray-200"
        >已取消</a
      >
    </div>

    <!-- Order List -->
    <main class="p-3 flex flex-col gap-3">
      <!-- Orders will be rendered here by JavaScript -->
    </main>

    <!-- Bottom Navigation Bar (Mobile App Style) -->
    <nav
      class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 pb-safe z-40"
    >
      <div class="flex justify-around items-center h-14">
        <a
          href="../products/index.html"
          class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors"
        >
          <i class="fas fa-store text-lg mb-0.5"></i>
          <span class="text-[10px] font-medium">商品</span>
        </a>
        <a
          href="#"
          class="flex flex-col items-center justify-center w-full h-full text-salmon-500"
        >
          <i class="fas fa-file-invoice text-lg mb-0.5"></i>
          <span class="text-[10px] font-medium">訂單</span>
        </a>
        <a
          href="#"
          class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors"
        >
          <i class="fas fa-user text-lg mb-0.5"></i>
          <span class="text-[10px] font-medium">會員</span>
        </a>
      </div>
    </nav>

    <!-- Scripts -->
    <script type="module" src="/orders/index.js"></script>
  </body>
</html>
