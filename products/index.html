<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>產品列表 - MOWI Taiwan</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              salmon: {
                50: "#f5f4f3",
                100: "#e6e4e2",
                500: "#2C2A29",
                600: "#1f1e1d",
              },
            },
          },
        },
      };
    </script>
    <style>
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none; /* IE and Edge */
        scrollbar-width: none; /* Firefox */
      }
      /* Support for safe area in iOS browsers/LIFF */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }

      body.modal-open {
        overflow: hidden;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-800 antialiased no-scrollbar pb-20">
    <!-- Header -->
    <header
      class="sticky top-0 z-40 bg-white shadow-sm px-4 py-3 flex items-center justify-between"
    >
      <div class="text-lg font-bold text-salmon-600">MOWI Taiwan</div>
      <div class="relative">
        <a href="/orders/create">
          <i class="fas fa-shopping-cart text-gray-600 text-xl"></i>
          <span
            class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center"
            >2</span
          >
        </a>
      </div>
    </header>

    <!-- Categories / Tabs (Horizontal Scroll) -->
    <div
      class="bg-white px-3 py-3 overflow-x-auto no-scrollbar whitespace-nowrap shadow-sm mb-2"
    >
      <a
        href="#"
        class="inline-block px-4 py-1.5 bg-salmon-500 text-white text-sm font-medium rounded-full mr-2"
        >全部商品</a
      >
      <a
        href="#"
        class="inline-block px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full mr-2 transition-colors hover:bg-gray-200"
        >魚片</a
      >
      <a
        href="#"
        class="inline-block px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full mr-2 transition-colors hover:bg-gray-200"
        >整魚</a
      >
    </div>

    <!-- Product List -->
    <main class="p-3 grid grid-cols-2 gap-3">
      <!-- Product Item 1 -->
      <div
        class="bg-white rounded-xl shadow-sm overflow-hidden flex flex-col border border-gray-100"
      >
        <div class="relative pb-[100%]">
          <img
            src="/placeholder.jpg"
            alt="鮭魚"
            class="absolute top-0 left-0 w-full h-full object-contain"
          />
          <div
            class="absolute top-2 left-2 bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow"
          >
            熱銷
          </div>
        </div>
        <div class="p-2.5 flex-1 flex flex-col">
          <h3
            class="text-sm font-medium text-gray-800 line-clamp-2 leading-snug mb-1"
          >
            頂級挪威鮮切鮭魚菲力 (300g)
          </h3>
          <p class="product-description text-xs text-gray-400 mb-0.5">
            嚴選大西洋鮭魚，定重切割、貼體包裝
          </p>
          <div class="mt-auto pt-2 flex items-end justify-between">
            <div>
              <p class="text-red-500 font-bold leading-none text-base">
                NT$ 380
              </p>
            </div>
            <button
              class="js-open-product-modal bg-salmon-500 text-white w-7 h-7 rounded-full flex items-center justify-center hover:bg-salmon-600 active:scale-95 transition-transform shadow-sm"
              data-specs="300g 厚切|600g 雙片|1kg 家庭號"
            >
              <i class="fas fa-plus text-sm"></i>
            </button>
          </div>
        </div>
      </div>
    </main>

    <div
      id="product-modal"
      class="fixed inset-0 z-50 hidden"
      aria-hidden="true"
    >
      <div
        id="product-modal-backdrop"
        class="absolute inset-0 bg-black/35 opacity-0 transition-opacity duration-200"
      ></div>

      <div
        id="product-modal-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="product-modal-title"
        class="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl max-h-[86vh] pb-safe overflow-y-auto shadow-2xl translate-y-full transition-transform duration-300"
      >
        <div
          class="px-4 py-3 border-b border-gray-100 flex items-center justify-between"
        >
          <h2
            id="product-modal-title"
            class="font-bold text-base text-gray-800"
          >
            商品選購
          </h2>
          <button
            id="product-modal-close"
            class="w-8 h-8 rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 transition-colors"
            aria-label="關閉"
          >
            <i class="fas fa-xmark"></i>
          </button>
        </div>

        <div class="p-4 space-y-4">
          <div class="flex gap-3">
            <div
              class="w-20 h-20 rounded-lg overflow-hidden border border-gray-100 shrink-0"
            >
              <img
                id="modal-product-image"
                src="/placeholder.jpg"
                alt="商品圖片"
                class="w-full h-full object-contain"
              />
            </div>
            <div class="flex-1 min-w-0">
              <h3
                id="modal-product-name"
                class="font-semibold text-sm text-gray-800 leading-snug"
              >
                商品名稱
              </h3>
              <p id="modal-product-desc" class="text-xs text-gray-500 mt-1">
                商品描述
              </p>
              <p
                id="modal-product-price"
                class="text-red-500 font-bold text-lg mt-2"
              >
                NT$ 0
              </p>
            </div>
          </div>

          <div>
            <h4 class="text-sm font-semibold text-gray-800 mb-2">商品規格</h4>
            <div id="modal-spec-options" class="grid grid-cols-2 gap-2"></div>
          </div>

          <div>
            <h4 class="text-sm font-semibold text-gray-800 mb-2">購買數量</h4>
            <div
              class="inline-flex items-center border border-gray-200 rounded-xl overflow-hidden"
            >
              <button
                id="modal-qty-minus"
                class="w-10 h-10 bg-gray-50 text-gray-600 hover:bg-gray-100 active:scale-95 transition-transform"
                aria-label="減少數量"
              >
                <i class="fas fa-minus text-xs"></i>
              </button>
              <input
                type="number"
                min="0"
                step="1"
                id="modal-qty-value"
                value="1"
                class="w-16 text-center font-semibold text-gray-800 bg-white focus:outline-none"
                aria-label="輸入數量"
              />
              <button
                id="modal-qty-plus"
                class="w-10 h-10 bg-gray-50 text-gray-600 hover:bg-gray-100 active:scale-95 transition-transform"
                aria-label="增加數量"
              >
                <i class="fas fa-plus text-xs"></i>
              </button>
            </div>
          </div>

          <button
            id="modal-confirm-btn"
            class="w-full bg-salmon-500 text-white font-semibold text-sm py-3.5 rounded-xl shadow-md hover:bg-salmon-600 active:scale-[0.98] transition-all"
          >
            確定
          </button>
        </div>
      </div>
    </div>

    <!-- Bottom Navigation Bar (Mobile App Style) -->
    <nav
      class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 pb-safe z-40"
    >
      <div class="flex justify-around items-center h-14">
        <a
          href="#"
          class="flex flex-col items-center justify-center w-full h-full text-salmon-500"
        >
          <i class="fas fa-store text-lg mb-0.5"></i>
          <span class="text-[10px] font-medium">商品</span>
        </a>
        <a
          href="../orders/index.html"
          class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors"
        >
          <i class="fas fa-file-invoice text-lg mb-0.5"></i>
          <span class="text-[10px] font-medium">訂單</span>
        </a>
        <a
          href="#"
          class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors"
        >
          <i class="fas fa-user text-lg mb-0.5"></i>
          <span class="text-[10px] font-medium">會員</span>
        </a>
      </div>
    </nav>

    <script>
      (() => {
        const modal = document.getElementById("product-modal");
        const panel = document.getElementById("product-modal-panel");
        const backdrop = document.getElementById("product-modal-backdrop");
        const closeBtn = document.getElementById("product-modal-close");
        const confirmBtn = document.getElementById("modal-confirm-btn");

        const productImage = document.getElementById("modal-product-image");
        const productName = document.getElementById("modal-product-name");
        const productDesc = document.getElementById("modal-product-desc");
        const productPrice = document.getElementById("modal-product-price");
        const specOptions = document.getElementById("modal-spec-options");

        const qtyMinusBtn = document.getElementById("modal-qty-minus");
        const qtyPlusBtn = document.getElementById("modal-qty-plus");
        const qtyValue = document.getElementById("modal-qty-value");

        const openButtons = document.querySelectorAll(".js-open-product-modal");

        const state = {
          qty: 1,
          selectedSpec: "",
        };

        const setQty = (nextQty) => {
          const parsedQty = Number(nextQty);
          const safeQty = Number.isFinite(parsedQty)
            ? Math.max(0, Math.floor(parsedQty))
            : 0;

          state.qty = safeQty;
          qtyValue.value = String(state.qty);
        };

        const parseSpecs = (button) => {
          const specs = (button.dataset.specs || "標準規格")
            .split("|")
            .map((item) => item.trim())
            .filter(Boolean);

          return specs.length ? specs : ["標準規格"];
        };

        const renderSpecs = (specs) => {
          state.selectedSpec = specs[0];

          specOptions.innerHTML = specs
            .map(
              (spec, index) =>
                `<button data-spec="${spec}" class="js-spec-item px-3 py-2 rounded-lg text-xs border transition-colors ${
                  index === 0
                    ? "border-salmon-500 bg-salmon-50 text-salmon-600"
                    : "border-gray-200 bg-white text-gray-600 hover:border-salmon-300"
                }">${spec}</button>`,
            )
            .join("");

          specOptions.querySelectorAll(".js-spec-item").forEach((button) => {
            button.addEventListener("click", () => {
              state.selectedSpec = button.dataset.spec || "";

              specOptions.querySelectorAll(".js-spec-item").forEach((item) => {
                item.classList.remove(
                  "border-salmon-500",
                  "bg-salmon-50",
                  "text-salmon-600",
                );
                item.classList.add(
                  "border-gray-200",
                  "bg-white",
                  "text-gray-600",
                  "hover:border-salmon-300",
                );
              });

              button.classList.remove(
                "border-gray-200",
                "bg-white",
                "text-gray-600",
                "hover:border-salmon-300",
              );
              button.classList.add(
                "border-salmon-500",
                "bg-salmon-50",
                "text-salmon-600",
              );
            });
          });
        };

        const openModal = (button) => {
          const card = button.closest(".bg-white.rounded-xl");

          if (!card) {
            return;
          }

          const imageEl = card.querySelector("img");
          const nameEl = card.querySelector("h3");
          const descEl =
            card.querySelector(".product-description");
          const priceEl = card.querySelector("p.text-red-500");

          productImage.src = imageEl?.src || "/placeholder.jpg";
          productImage.alt = nameEl?.textContent?.trim() || "商品圖片";
          productName.textContent = nameEl?.textContent?.trim() || "未命名商品";
          productDesc.innerHTML = descEl?.innerHTML?.trim() || "";
          productPrice.textContent = priceEl?.textContent?.trim() || "NT$ 0";

          renderSpecs(parseSpecs(button));
          setQty(1);

          modal.classList.remove("hidden");
          document.body.classList.add("modal-open");

          requestAnimationFrame(() => {
            backdrop.classList.remove("opacity-0");
            backdrop.classList.add("opacity-100");
            panel.classList.remove("translate-y-full");
            panel.classList.add("translate-y-0");
          });

          modal.setAttribute("aria-hidden", "false");
        };

        const closeModal = () => {
          backdrop.classList.remove("opacity-100");
          backdrop.classList.add("opacity-0");
          panel.classList.remove("translate-y-0");
          panel.classList.add("translate-y-full");
          modal.setAttribute("aria-hidden", "true");

          window.setTimeout(() => {
            modal.classList.add("hidden");
            document.body.classList.remove("modal-open");
          }, 250);
        };

        openButtons.forEach((button) => {
          button.addEventListener("click", () => openModal(button));
        });

        closeBtn.addEventListener("click", closeModal);
        confirmBtn.addEventListener("click", closeModal);
        backdrop.addEventListener("click", closeModal);

        qtyMinusBtn.addEventListener("click", () => setQty(state.qty - 1));
        qtyPlusBtn.addEventListener("click", () => setQty(state.qty + 1));
        qtyValue.addEventListener("input", () => setQty(qtyValue.value));
        qtyValue.addEventListener("blur", () => setQty(qtyValue.value));

        document.addEventListener("keydown", (event) => {
          if (
            event.key === "Escape" &&
            modal.getAttribute("aria-hidden") === "false"
          ) {
            closeModal();
          }
        });
      })();
    </script>
    <script type="module">
      import liff from "@line/liff";
      import { createLiffApi } from "/api/index.js";

      main();

      async function main() {
        await liff.init({ liffId: "2009395054-rgDD7RPZ" });

        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          const api = createLiffApi();
          const profile = await liff.getProfile();
          const { userId } = profile;

          // api
          //   .getProducts(userId, {
          //     customerId: 1,
          //     divisionId: 1,
          //   })
          //   .then((products) => {
          //     console.log("Products:", products);
          //   })
          //   .catch((error) => {
          //     console.error("Error fetching products:", error);
          //   });
        }
      }
    </script>
  </body>
</html>
