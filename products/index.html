<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>產品列表 - Supreme Salmon</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        salmon: {
                            50: '#fff3f1',
                            100: '#ffe4df',
                            500: '#ff7b65',
                            600: '#f55a42',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        /* Support for safe area in iOS browsers/LIFF */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased no-scrollbar pb-20">

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-white shadow-sm px-4 py-3 flex items-center justify-between">
        <div class="text-lg font-bold text-salmon-600">Supreme Salmon</div>
        <div class="relative">
            <a href="/orders/create">
                <i class="fas fa-shopping-cart text-gray-600 text-xl"></i>
                <span class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center">2</span>
            </a>
        </div>
    </header>

    <!-- Categories / Tabs (Horizontal Scroll) -->
    <div class="bg-white px-3 py-3 overflow-x-auto no-scrollbar whitespace-nowrap shadow-sm mb-2">
        <a href="#" class="inline-block px-4 py-1.5 bg-salmon-500 text-white text-sm font-medium rounded-full mr-2">全部商品</a>
        <a href="#" class="inline-block px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full mr-2 transition-colors hover:bg-gray-200">生鮮鮭魚</a>
        <a href="#" class="inline-block px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full mr-2 transition-colors hover:bg-gray-200">調理熟食</a>
        <a href="#" class="inline-block px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full mr-2 transition-colors hover:bg-gray-200">禮盒專區</a>
        <a href="#" class="inline-block px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full mr-2 transition-colors hover:bg-gray-200">週邊商品</a>
    </div>

    <!-- Product List -->
    <main class="p-3 grid grid-cols-2 gap-3">
        
        <!-- Product Item 1 -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden flex flex-col border border-gray-100">
            <div class="relative pb-[100%]">
                <img src="https://images.unsplash.com/photo-1599084993091-1cb5c0721cc6?auto=format&fit=crop&w=300&q=80" alt="鮭魚" class="absolute top-0 left-0 w-full h-full object-cover">
                <div class="absolute top-2 left-2 bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow">熱銷</div>
            </div>
            <div class="p-2.5 flex-1 flex flex-col">
                <h3 class="text-sm font-medium text-gray-800 line-clamp-2 leading-snug mb-1">頂級挪威鮮切鮭魚菲力 (300g)</h3>
                <p class="text-xs text-gray-400 mb-0.5">嚴選大西洋鮭魚，定重切割、貼體包裝</p>
                <div class="mt-auto pt-2 flex items-end justify-between">
                    <div>
                        <p class="text-salmon-600 font-bold leading-none text-base">NT$ 380</p>
                    </div>
                    <button class="bg-salmon-500 text-white w-7 h-7 rounded-full flex items-center justify-center hover:bg-salmon-600 active:scale-95 transition-transform shadow-sm">
                        <i class="fas fa-plus text-sm"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Product Item 2 -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden flex flex-col border border-gray-100">
            <div class="relative pb-[100%]">
                <img src="https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?auto=format&fit=crop&w=300&q=80" alt="鮭魚" class="absolute top-0 left-0 w-full h-full object-cover">
            </div>
            <div class="p-2.5 flex-1 flex flex-col">
                <h3 class="text-sm font-medium text-gray-800 line-clamp-2 leading-snug mb-1">智利厚切鮭魚排 家庭號 (500g)</h3>
                <p class="text-xs text-gray-400 mb-0.5">嚴選大西洋鮭魚，定重切割、貼體包裝</p>
                <div class="mt-auto pt-2 flex items-end justify-between">
                    <div>
                        <p class="text-salmon-600 font-bold leading-none text-base">NT$ 520</p>
                    </div>
                    <button class="bg-salmon-500 text-white w-7 h-7 rounded-full flex items-center justify-center hover:bg-salmon-600 active:scale-95 transition-transform shadow-sm">
                        <i class="fas fa-plus text-sm"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Product Item 3 -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden flex flex-col border border-gray-100">
            <div class="relative pb-[100%]">
                <img src="https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?auto=format&fit=crop&w=300&q=80" alt="鮭魚卵" class="absolute top-0 left-0 w-full h-full object-cover">
                <div class="absolute top-2 left-2 bg-yellow-400 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow">新品</div>
            </div>
            <div class="p-2.5 flex-1 flex flex-col">
                <h3 class="text-sm font-medium text-gray-800 line-clamp-2 leading-snug mb-1">嚴選北海道生食級鮭魚卵</h3>
                <p class="text-xs text-gray-400 mb-0.5">嚴選大西洋鮭魚，定重切割、貼體包裝</p>
                <div class="mt-auto pt-2 flex items-end justify-between">
                    <div>
                        <p class="text-salmon-600 font-bold leading-none text-base">NT$ 890</p>
                    </div>
                    <button class="bg-salmon-500 text-white w-7 h-7 rounded-full flex items-center justify-center hover:bg-salmon-600 active:scale-95 transition-transform shadow-sm">
                        <i class="fas fa-plus text-sm"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Product Item 4 -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden flex flex-col border border-gray-100">
            <div class="relative pb-[100%]">
                <img src="https://images.unsplash.com/photo-1485921325833-c519f76c4927?auto=format&fit=crop&w=300&q=80" alt="燻鮭魚" class="absolute top-0 left-0 w-full h-full object-cover">
            </div>
            <div class="p-2.5 flex-1 flex flex-col">
                <h3 class="text-sm font-medium text-gray-800 line-clamp-2 leading-snug mb-1">法式冷燻鮭魚切片 薄切 (150g)</h3>
                <p class="text-xs text-gray-400 mb-0.5">嚴選大西洋鮭魚，定重切割、貼體包裝</p>
                <div class="mt-auto pt-2 flex items-end justify-between">
                    <div>
                        <p class="text-salmon-600 font-bold leading-none text-base">NT$ 250</p>
                    </div>
                    <button class="bg-salmon-500 text-white w-7 h-7 rounded-full flex items-center justify-center hover:bg-salmon-600 active:scale-95 transition-transform shadow-sm">
                        <i class="fas fa-plus text-sm"></i>
                    </button>
                </div>
            </div>
        </div>
        
    </main>

    <!-- Bottom Navigation Bar (Mobile App Style) -->
    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 pb-safe z-40">
        <div class="flex justify-around items-center h-14">
            <a href="#" class="flex flex-col items-center justify-center w-full h-full text-salmon-500">
                <i class="fas fa-store text-lg mb-0.5"></i>
                <span class="text-[10px] font-medium">商品</span>
            </a>
            <a href="../orders/index.html" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fas fa-file-invoice text-lg mb-0.5"></i>
                <span class="text-[10px] font-medium">訂單</span>
            </a>
            <a href="#" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fas fa-user text-lg mb-0.5"></i>
                <span class="text-[10px] font-medium">會員</span>
            </a>
        </div>
    </nav>

</body>
</html>
